# 监听地址
host: "0.0.0.0"
port: 8317

# 认证文件存放目录（codex-*.json）
auth_dir: "./auths"

# 代理 API 的下游 key（客户端调用 /v1/* 时用）
api_keys:
  - "sk-cool-proxy-change-me"

# 管理面板的访问 token（前端登录后会带在请求头）
admin_token: "admin-change-me"

# 上游 OpenAI Codex 端点
upstream:
  base_url: "https://chatgpt.com/backend-api/codex"

# 失败处理
retry:
  max_retries: 3
  cooldown_seconds: 60          # transient/网络错误连续超阈值后的短冷却
  long_cooldown_seconds: 300    # 兼容字段，按 (账号, 模型) 二维状态机后已不再使用
  failure_threshold: 3          # 兼容字段，按 (账号, 模型) 二维状态机后已不再使用
  transient_threshold: 3        # 连续 N 次 5xx/网络错才进短冷却；默认 3
  disable_cooldown: false       # true = 所有冷却写入跳过，便于定位上游真实错误

# token 刷新
token_refresh:
  scan_interval_seconds: 60
  refresh_before_expire_seconds: 300

# 日志
log:
  level: "info"   # trace / debug / info / warn / error
